services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: auth-service-api
    env_file:
      - .env
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run start:dev
    restart: unless-stopped
